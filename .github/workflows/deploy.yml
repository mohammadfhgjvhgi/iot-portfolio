name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js
        run: bun run build

      - name: Verify docs/ output
        run: |
          echo "=== docs/ contents ==="
          ls -la docs/
          echo ""
          echo "=== Checking critical files ==="
          test -f docs/index.html && echo "✅ index.html found" || echo "❌ index.html MISSING"
          test -f docs/.nojekyll && echo "✅ .nojekyll found" || echo "❌ .nojekyll MISSING"
          test -f docs/robots.txt && echo "✅ robots.txt found" || echo "❌ robots.txt MISSING"
          test -d docs/images && echo "✅ images/ folder found" || echo "❌ images/ MISSING"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
